# Dex configuration for the public deployment. Static local users by default;
# swap the connectors section for GitHub/Google/LDAP per the Dex docs.
issuer: https://$MLAIOPS_DOMAIN/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: mlaiops-console
    name: Nexus Console
    redirectURIs:
      - https://$MLAIOPS_DOMAIN/auth/callback
    secretEnv: DEX_CLIENT_SECRET

enablePasswordDB: true
staticPasswords:
  - email: $DEX_ADMIN_EMAIL
    hashFromEnv: DEX_ADMIN_PASSWORD_HASH
    username: admin
    userID: mlaiops-admin
