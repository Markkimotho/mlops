name: Pressure Test

# Heavier lane than Platform CI: it boots the whole platform and pushes it —
# full-stack end-to-end, concurrency, load with SLO thresholds — plus a
# supply-chain vulnerability scan. Runs on main, nightly, and on demand
# (kept off every PR because booting the stack is expensive).

on:
  push:
    branches: [main]
    paths:
      - go/**
      - python/**
      - deploy/**
      - scripts/**
      - tests/**
      - Dockerfile
      - Makefile
      - .github/workflows/pressure-test.yml
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly at 03:00 UTC

concurrency:
  group: pressure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Supply-chain vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.mod
      - name: govulncheck (Go — fails on any called vulnerability)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd go && govulncheck ./...
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: pip-audit (Python dependencies)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

  stack:
    name: Full-stack pressure (smoke + load + concurrency)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Boot the full platform
        run: |
          docker compose -f deploy/compose.yaml up -d --build
          bash scripts/local-topics.sh

      - name: Wait for the stack to become ready
        run: |
          ready() { curl -fsS "$1" >/dev/null 2>&1; }
          for i in $(seq 1 90); do
            if ready http://localhost:8080/api/v1/health \
               && ready http://localhost:15000/health \
               && ready http://localhost:4200/api/health; then
              echo "stack ready after ${i} checks"; exit 0
            fi
            sleep 5
          done
          echo "stack did not become ready in time"; exit 1

      - name: End-to-end smoke (18 platform capabilities)
        run: ./scripts/demo-smoke.sh

      - name: Concurrency stress (transactional control plane)
        run: REQUESTS=300 CONCURRENCY=48 ./scripts/stress-test.sh

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Load test with SLO thresholds
        run: k6 run -e PROFILE=smoke -e MLAIOPS_URL=http://localhost:8080 tests/load/gateway.js

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f deploy/compose.yaml logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose.yaml down -v
